<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #050508;
      --bg-secondary: #0a0a12;
      --bg-card: #12121a;
      --accent: #8b5cf6;
      --accent-cyan: #06b6d4;
      --accent-pink: #ec4899;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #2a2a3a;
      --gradient-1: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 50%, #ec4899 100%);
      --gradient-2: linear-gradient(135deg, #050508 0%, #0f0f1a 50%, #1a1a2e 100%);
      --gradient-3: linear-gradient(90deg, #8b5cf6, #06b6d4, #ec4899, #8b5cf6);
      --glow-purple: rgba(139, 92, 246, 0.5);
      --glow-cyan: rgba(6, 182, 212, 0.5);
      --glow-pink: rgba(236, 72, 153, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--gradient-2);
      color: var(--text-primary);
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .bg-blob {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: blob-move 20s infinite ease-in-out;
    }

    .bg-blob.purple {
      background: var(--glow-purple);
      top: -200px;
      left: -200px;
    }

    .bg-blob.cyan {
      background: var(--glow-cyan);
      bottom: -200px;
      right: -200px;
      animation-delay: -10s;
    }

    .bg-blob.pink {
      background: var(--glow-pink);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -5s;
    }

    @keyframes blob-move {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(100px, -50px) rotate(90deg); }
      50% { transform: translate(-50px, 100px) rotate(180deg); }
      75% { transform: translate(-100px, -50px) rotate(270deg); }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(5, 5, 8, 0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    header.scrolled {
      background: rgba(5, 5, 8, 0.9);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      background: var(--gradient-1);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
      animation: gradient-shift 3s ease infinite;
      letter-spacing: 2px;
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      position: relative;
      transition: color 0.3s ease;
      padding: 0.5rem 0;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--gradient-1);
      transition: width 0.3s ease;
    }

    .nav-links a:hover {
      color: var(--text-primary);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* Hero Section */
    .hero {
      padding: 14rem 0 8rem;
      text-align: center;
      position: relative;
    }

    .hero .badge {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(6, 182, 212, 0.1));
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 2rem;
      font-size: 0.85rem;
      color: var(--accent-cyan);
      margin-bottom: 2.5rem;
      backdrop-filter: blur(10px);
      animation: badge-pulse 2s ease-in-out infinite;
    }

    @keyframes badge-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
      50% { box-shadow: 0 0 40px rgba(6, 182, 212, 0.5); }
    }

    .hero h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 900;
      margin-bottom: 1.5rem;
      line-height: 1.1;
      letter-spacing: -2px;
    }

    .hero h1 .static-text {
      color: var(--text-primary);
    }

    .hero h1 .dynamic-text {
      background: var(--gradient-1);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-shift 2s ease infinite;
      text-shadow: 0 0 60px rgba(139, 92, 246, 0.5);
    }

    .hero p {
      font-size: 1.3rem;
      color: var(--text-secondary);
      max-width: 650px;
      margin: 0 auto 3rem;
      animation: fade-in-up 0.8s ease 0.3s both;
    }

    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero .cta-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      border-radius: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: var(--gradient-1);
      color: white;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(139, 92, 246, 0.6);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: var(--bg-card);
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
    }

    /* Floating Animation */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    /* Section Title */
    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 1.75rem;
      background: var(--gradient-1);
      border-radius: 2px;
      animation: border-glow 2s ease-in-out infinite;
    }

    @keyframes border-glow {
      0%, 100% { box-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }
      50% { box-shadow: 0 0 25px rgba(6, 182, 212, 0.8); }
    }

    /* Posts Grid */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 2rem;
      padding-bottom: 6rem;
    }

    .post-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 2rem;
      text-decoration: none;
      color: inherit;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .post-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--gradient-3);
      background-size: 200% 100%;
      opacity: 0;
      transition: opacity 0.3s ease;
      animation: gradient-flow 3s linear infinite;
    }

    @keyframes gradient-flow {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .post-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: rgba(139, 92, 246, 0.5);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 0 0 80px rgba(139, 92, 246, 0.2);
    }

    .post-card:hover::before {
      opacity: 1;
    }

    .post-date {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-family: 'JetBrains Mono', monospace;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .post-date::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: date-dot-pulse 2s ease-in-out infinite;
    }

    @keyframes date-dot-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .post-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text-primary);
      transition: color 0.3s ease;
      line-height: 1.4;
    }

    .post-card:hover .post-title {
      color: var(--accent);
    }

    .post-excerpt {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 1.25rem;
    }

    .post-tags {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .tag {
      padding: 0.35rem 1rem;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(6, 182, 212, 0.1));
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      transition: all 0.3s ease;
    }

    .post-card:hover .tag {
      border-color: rgba(139, 92, 246, 0.5);
      color: var(--text-primary);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 4rem 0;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.95rem;
      position: relative;
      z-index: 1;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      position: relative;
    }

    footer a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--gradient-1);
      transition: width 0.3s ease;
    }

    footer a:hover::after {
      width: 100%;
    }

    /* Post Page */
    .post-page {
      padding: 10rem 0 6rem;
      max-width: 850px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .post-page h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 800;
      margin-bottom: 1.5rem;
      background: var(--gradient-1);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient-shift 3s ease infinite;
    }

    .post-meta {
      display: flex;
      gap: 2rem;
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 3rem;
      font-family: 'JetBrains Mono', monospace;
      flex-wrap: wrap;
    }

    .post-content {
      font-size: 1.15rem;
      line-height: 1.9;
    }

    .post-content h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      margin: 3rem 0 1.5rem;
      color: var(--text-primary);
      position: relative;
    }

    .post-content h2::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 60px;
      height: 3px;
      background: var(--gradient-1);
      border-radius: 2px;
    }

    .post-content h3 {
      font-size: 1.4rem;
      margin: 2.5rem 0 1rem;
      color: var(--text-primary);
    }

    .post-content p {
      margin-bottom: 1.75rem;
      color: var(--text-secondary);
    }

    .post-content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: all 0.3s;
    }

    .post-content a:hover {
      border-color: var(--accent);
      text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
    }

    .post-content code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(139, 92, 246, 0.1);
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      font-size: 0.9em;
      color: var(--accent-cyan);
    }

    .post-content pre {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      overflow-x: auto;
      margin: 2rem 0;
      position: relative;
    }

    .post-content pre::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient-3);
      background-size: 200% 100%;
      border-radius: 1rem 1rem 0 0;
      animation: gradient-flow 3s linear infinite;
    }

    .post-content pre code {
      background: none;
      padding: 0;
      color: var(--text-primary);
    }

    .post-content blockquote {
      border-left: 4px solid var(--accent);
      padding: 1.25rem 1.75rem;
      margin: 2rem 0;
      background: rgba(139, 92, 246, 0.05);
      border-radius: 0 0.75rem 0.75rem 0;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .hero {
        padding: 12rem 0 6rem;
      }

      .hero h1 {
        font-size: clamp(2.2rem, 7vw, 3.5rem);
      }

      .posts-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      .post-card {
        padding: 1.5rem;
      }
    }

    /* Loading Animation */
    .loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-ring {
      width: 50px;
      height: 50px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading" id="loading">
    <div class="loading-ring"></div>
  </div>

  <!-- Animated Background -->
  <div class="bg-animation">
    <div class="bg-blob purple"></div>
    <div class="bg-blob cyan"></div>
    <div class="bg-blob pink"></div>
  </div>

  <header id="header">
    <nav>
      <a href="{{ site.baseurl }}/" class="logo">{{ site.title }}</a>
      <ul class="nav-links">
        <li><a href="{{ site.baseurl }}/">首页</a></li>
        <li><a href="{{ site.baseurl }}/about">关于</a></li>
        <li><a href="https://github.com/{{ site.github_username }}" target="_blank">GitHub</a></li>
      </ul>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ site.time | date: '%Y' }} <a href="https://github.com/{{ site.github_username }}">{{ site.author | default: site.github_username }}</a>. 用 <a href="https://jekyllrb.com">Jekyll</a> 构建。</p>
    <p style="margin-top: 1rem; font-size: 0.85rem; opacity: 0.6;">✨ Powered by Docker & GitHub Pages</p>
  </footer>

  <script>
    // Loading Screen
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
      }, 800);
    });

    // Header Scroll Effect
    window.addEventListener('scroll', () => {
      const header = document.getElementById('header');
      if (window.scrollY > 50) {
        header.classList.add('scrolled');
      } else {
        header.classList.remove('scrolled');
      }
    });

    // Smooth Scroll
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelector(this.getAttribute('href')).scrollIntoView({
          behavior: 'smooth'
        });
      });
    });

    // Add hover effects to cards
    document.addEventListener('DOMContentLoaded', () => {
      const cards = document.querySelectorAll('.post-card');
      cards.forEach(card => {
        card.addEventListener('mouseenter', () => {
          card.style.transform = 'translateY(-8px) scale(1.02)';
        });
        card.addEventListener('mouseleave', () => {
          card.style.transform = 'translateY(0) scale(1)';
        });
      });
    });
  </script>
</body>
</html>
