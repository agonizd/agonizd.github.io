---
layout: default
---
<div class="container">
  <article class="post-page">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <span>{{ page.date | date: "%Y-%m-%d" }}</span>
      <span>•</span>
      <span>{{ page.author }}</span>
      {% if page.tags %}
      <span>•</span>
      <span>{{ page.tags | join: ", " }}</span>
      {% endif %}
    </div>
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
